<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CRM — Fabio Mecânica Diesel</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react" src="data.jsx"></script>
<script type="text/babel" data-presets="react" src="Shell.jsx"></script>
<script type="text/babel" data-presets="react" src="Dashboard.jsx"></script>
<script type="text/babel" data-presets="react" src="Clientes.jsx"></script>
<script type="text/babel" data-presets="react" src="Ordens.jsx"></script>
<script type="text/babel" data-presets="react" src="Pages.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('crm.page') || 'dash');
  const go = (p) => { setPage(p); localStorage.setItem('crm.page', p); window.scrollTo(0,0); };

  const counts = { os: OS_LIST.filter(o => o.status !== 'faturada').length, clientes: CLIENTES.length, veiculos: VEICULOS.length };

  // Routing on simple string page id. "os/OS-XXXX" and "clientes/C-XXX" are detail routes.
  let view, crumbs, label;
  if (page === 'dash') { view = <Dashboard go={go}/>; crumbs = ['PAINEL']; label = '01 Painel'; }
  else if (page === 'clientes') { view = <Clientes go={go}/>; crumbs = ['CLIENTES']; label='02 Clientes'; }
  else if (page.startsWith('clientes/')) { view = <ClienteDetail id={page.split('/')[1]} go={go}/>; crumbs = ['CLIENTES', page.split('/')[1]]; label='02a Cliente Detalhe'; }
  else if (page === 'os') { view = <Ordens go={go}/>; crumbs = ['ORDENS']; label='03 OS'; }
  else if (page.startsWith('os/')) { view = <OrdemDetail num={page.split('/')[1]} go={go}/>; crumbs = ['ORDENS', page.split('/')[1]]; label='03a OS Detalhe'; }
  else if (page === 'veiculos') { view = <Veiculos go={go}/>; crumbs = ['VEÍCULOS']; label='04 Veículos'; }
  else if (page === 'agenda') { view = <Agenda/>; crumbs = ['AGENDA']; label='05 Agenda'; }
  else if (page === 'financeiro') { view = <Financeiro/>; crumbs = ['FINANCEIRO']; label='06 Financeiro'; }
  else if (page === 'config') { view = <div className="page"><div className="page-head"><div><span className="eyebrow">AJUSTES</span><div className="page-title">CONFIGURAÇÕES</div><p>Usuários, formas de pagamento, integrações. (mock)</p></div></div></div>; crumbs = ['CONFIG']; label='07 Config'; }
  else { view = <Dashboard go={go}/>; crumbs = ['PAINEL']; label='01 Painel'; }

  const sbKey = page.split('/')[0];

  return (
    <div className="app" data-screen-label={label}>
      <Sidebar page={sbKey} go={go} counts={counts}/>
      <div className="main">
        <Topbar crumbs={crumbs}/>
        {view}
      </div>
    </div>
  );
}

function mount() {
  const ok = window.Dashboard && window.Clientes && window.ClienteDetail && window.Ordens && window.OrdemDetail && window.Veiculos && window.Agenda && window.Financeiro && window.Sidebar && window.Topbar;
  if (!ok) return setTimeout(mount, 50);
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
mount();
</script>
</body>
</html>
