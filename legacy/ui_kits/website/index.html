<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fabio Mecânica Diesel</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root" data-screen-label="Marketing Site"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ServicesGrid.jsx"></script>
<script type="text/babel" src="TrustBar.jsx"></script>
<script type="text/babel" src="HoursMap.jsx"></script>
<script type="text/babel" src="ContactModal.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [modal, setModal] = React.useState(false);
  return (
    <>
      <Nav />
      <Hero onContact={() => setModal(true)} />
      <TrustBar />
      <ServicesGrid />
      <About />
      <HoursMap />
      <Footer />
      <WhatsAppFloat onClick={() => setModal(true)} />
      <ContactModal open={modal} onClose={() => setModal(false)} />
    </>
  );
}

// Wait until all text/babel scripts have finished transpiling & executing.
function mountWhenReady() {
  const ok = window.Nav && window.Hero && window.ServicesGrid && window.TrustBar && window.About && window.HoursMap && window.ContactModal && window.WhatsAppFloat && window.Footer;
  if (!ok) { return setTimeout(mountWhenReady, 50); }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
mountWhenReady();
</script>
</body>
</html>
