<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Semantic Colors</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 660px; }
  .cell .name { font-family:var(--font-display); font-size: 12px; text-transform: uppercase; letter-spacing:.04em; margin-top:6px; }
  .cell .meta { font-family:var(--font-mono); font-size:10px; color:var(--graxa); }
</style></head>
<body>
<div class="grid">
  <div class="cell">
    <div class="swatch" style="background:#FFC400"><span class="lbl">#FFC400</span></div>
    <div class="name">Amarelo Alerta</div><div class="meta">warning</div>
  </div>
  <div class="cell">
    <div class="swatch dark" style="background:#D7263D"><span class="lbl">#D7263D</span></div>
    <div class="name">Vermelho Freio</div><div class="meta">error · urgent</div>
  </div>
  <div class="cell">
    <div class="swatch" style="background:#4CB944"><span class="lbl">#4CB944</span></div>
    <div class="name">Verde Painel</div><div class="meta">success</div>
  </div>
  <div class="cell">
    <div class="swatch" style="background:#25D366"><span class="lbl">#25D366</span></div>
    <div class="name">WhatsApp</div><div class="meta">whatsapp CTA</div>
  </div>
</div>
</body></html>
