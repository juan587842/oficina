<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--papel); }
  .wrap { width: 660px; display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .ico {
    aspect-ratio: 1;
    border: 2px solid var(--preto-diesel);
    border-radius: 4px;
    background: white;
    display: flex; align-items: center; justify-content: center;
    color: var(--preto-diesel);
  }
  .ico svg { width: 28px; height: 28px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--graxa); text-align: center; margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }
  .cell { display: flex; flex-direction: column; }
</style></head>
