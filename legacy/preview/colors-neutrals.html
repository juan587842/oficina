<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Neutral Colors</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 660px; }
  .cell .name { font-family:var(--font-display); font-size: 12px; text-transform: uppercase; letter-spacing:.04em; margin-top:6px; }
  .cell .meta { font-family:var(--font-mono); font-size:10px; color:var(--graxa); }
</style></head>
<body>
<div class="grid">
  <div class="cell">
    <div class="swatch dark" style="background:#0E0E10"><span class="lbl">#0E0E10</span></div>
    <div class="name">Preto Diesel</div><div class="meta">fg1 / bg-inverse</div>
  </div>
  <div class="cell">
    <div class="swatch dark" style="background:#2A2D33"><span class="lbl">#2A2D33</span></div>
    <div class="name">Aço</div><div class="meta">surface-inverse</div>
  </div>
  <div class="cell">
    <div class="swatch dark" style="background:#55585F"><span class="lbl">#55585F</span></div>
    <div class="name">Graxa</div><div class="meta">fg3 · borders</div>
  </div>
  <div class="cell">
    <div class="swatch" style="background:#C9C8C3"><span class="lbl">#C9C8C3</span></div>
    <div class="name">Concreto</div><div class="meta">light gray</div>
  </div>
  <div class="cell">
    <div class="swatch" style="background:#F5F2EC;border-color:#0E0E10"><span class="lbl">#F5F2EC</span></div>
    <div class="name">Papel</div><div class="meta">bg · main</div>
  </div>
</div>
</body></html>
