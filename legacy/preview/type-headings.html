<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Headings</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px; }
  .row { width: 660px; border-bottom: 1px solid #D9D6CE; padding: 10px 0; display: flex; align-items: baseline; gap: 14px; }
  .row:last-child { border: 0; }
  .spec {
    font-family: var(--font-mono); font-size: 10px; color: var(--graxa);
    min-width: 120px; text-transform: uppercase; letter-spacing: .06em;
  }
  .spec strong { color: var(--preto-diesel); font-weight: 700; font-size: 11px; }
  .h {
    font-family: var(--font-display); font-weight: 600; text-transform: uppercase;
    color: var(--preto-diesel); line-height: 1.1;
  }
  .eyebrow {
    font-family: var(--font-display); font-size: 14px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--laranja-oficina);
  }
</style></head>
<body>
<div class="row"><div class="spec"><strong>h1</strong><br>32 / 600</div><div class="h" style="font-size:32px">Orçamento grátis hoje</div></div>
<div class="row"><div class="spec"><strong>h2</strong><br>24 / 600</div><div class="h" style="font-size:24px">Serviços especializados</div></div>
<div class="row"><div class="spec"><strong>h3</strong><br>18 / 600 · +4%</div><div class="h" style="font-size:18px;letter-spacing:.04em">Manutenção preventiva</div></div>
<div class="row"><div class="spec"><strong>eyebrow</strong><br>14 / 600 · +8%</div><div class="eyebrow">OFICINA · ESPECIALISTA</div></div>
</body></html>
