<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Voice &amp; Tone</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--papel); }
  .wrap { width: 660px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col { border: 2px solid var(--preto-diesel); border-radius: 4px; background: white; padding: 16px; }
  .col h4 {
    font-family: var(--font-display); font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em; margin: 0 0 10px;
  }
  .yes h4 { color: #2E7A24; }
  .no h4 { color: #9A1B2A; }
  .item {
    font-family: var(--font-body);
    font-size: 13px; line-height: 1.45;
    padding: 6px 0;
    border-bottom: 1px dashed var(--border-soft);
  }
  .item:last-child { border: 0; }
  .mark { font-family: var(--font-mono); font-weight: 700; font-size: 12px; margin-right: 6px; }
  .yes .mark { color: #2E7A24; }
  .no .mark { color: #9A1B2A; text-decoration: line-through; }
</style></head>
<body>
<div class="wrap">
  <div class="col yes">
    <h4>✓ Como a gente fala</h4>
    <div class="item"><span class="mark">›</span>"Caminhão parado é prejuízo."</div>
    <div class="item"><span class="mark">›</span>"A gente resolve hoje."</div>
    <div class="item"><span class="mark">›</span>"CHAMA NO ZAP"</div>
    <div class="item"><span class="mark">›</span>"Bico injetor, turbo — a gente faz tudo."</div>
  </div>
  <div class="col no">
    <h4>✗ Como a gente NÃO fala</h4>
    <div class="item"><span class="mark">×</span>"Prezado cliente, gostaríamos..."</div>
    <div class="item"><span class="mark">×</span>"Soluções inovadoras em manutenção"</div>
    <div class="item"><span class="mark">×</span>"Referência no segmento"</div>
    <div class="item"><span class="mark">×</span>"Excelência automotiva"</div>
  </div>
</div>
</body></html>
