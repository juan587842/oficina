<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Brand Colors</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 660px; }
</style></head>
<body>
<div class="grid">
  <div>
    <div class="swatch" style="background:#FF6A1A"><span class="lbl">#FF6A1A</span></div>
    <div style="font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:.04em;margin-top:6px">Laranja Oficina</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--graxa)">--laranja-oficina · primary</div>
  </div>
  <div>
    <div class="swatch dark" style="background:#0E0E10"><span class="lbl">#0E0E10</span></div>
    <div style="font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:.04em;margin-top:6px">Preto Diesel</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--graxa)">--preto-diesel · primary dark</div>
  </div>
</div>
</body></html>
