<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--papel); }
  .wrap { width: 660px; display: flex; flex-wrap: wrap; gap: 14px; }
  .btn { cursor: default; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--graxa); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; display: block; }
  .group { display: flex; flex-direction: column; gap: 8px; }
</style></head>
<body>
<div class="wrap">
  <div class="group"><span class="label">Primary</span>
    <a class="btn">FALA COM A GENTE ›</a>
  </div>
  <div class="group"><span class="label">Secondary</span>
    <a class="btn secondary">VER SERVIÇOS</a>
  </div>
  <div class="group"><span class="label">Ghost</span>
    <a class="btn ghost">COMO CHEGAR</a>
  </div>
  <div class="group"><span class="label">WhatsApp</span>
    <a class="btn whatsapp">CHAMA NO ZAP</a>
  </div>
  <div class="group"><span class="label">Pressed state</span>
    <a class="btn" style="transform:translate(4px,4px); box-shadow:0 0 0 0 var(--preto-diesel)">PRESSIONADO</a>
  </div>
  <div class="group"><span class="label">Disabled</span>
    <a class="btn" style="opacity:.4;cursor:not-allowed">INDISPONÍVEL</a>
  </div>
</div>
</body></html>
