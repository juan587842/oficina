<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Logos</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; background: var(--papel); }
  .logos { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 660px; }
  .logo-tile { border: 2px solid var(--preto-diesel); border-radius: 4px; padding: 18px; display: flex; align-items: center; justify-content: center; min-height: 160px; }
  .logo-tile.dark { background: var(--preto-diesel); }
  .logo-tile img { max-width: 100%; max-height: 120px; }
  .lbl { position: absolute; top: 6px; left: 8px; font-family: var(--font-mono); font-size: 10px; color: var(--graxa); text-transform: uppercase; letter-spacing: 0.08em; }
  .logo-tile { position: relative; }
  .logo-tile.dark .lbl { color: #B8B6B0; }
</style></head>
<body>
<div class="logos">
  <div class="logo-tile"><span class="lbl">primary · on papel</span><img src="../assets/logo-primary.svg" alt=""></div>
  <div class="logo-tile dark"><span class="lbl">mark · on preto</span><img src="../assets/logo-mark.svg" alt=""></div>
</div>
</body></html>
