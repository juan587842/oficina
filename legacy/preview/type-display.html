<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px; }
  .row { width: 660px; border-bottom: 1px solid #D9D6CE; padding: 10px 0; display: flex; align-items: baseline; gap: 14px; }
  .row:last-child { border: 0; }
  .row .spec {
    font-family: var(--font-mono); font-size: 10px; color: var(--graxa);
    min-width: 120px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .spec strong { color: var(--preto-diesel); font-weight: 700; font-size: 11px; }
  .sample {
    font-family: var(--font-display);
    color: var(--preto-diesel);
    text-transform: uppercase;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }
</style></head>
<body>
<div class="row"><div class="spec"><strong>display-xl</strong><br>88 / 700</div><div class="sample" style="font-size:54px">CAMINHÃO</div></div>
<div class="row"><div class="spec"><strong>display-lg</strong><br>64 / 700</div><div class="sample" style="font-size:44px">DIESEL FORTE</div></div>
<div class="row"><div class="spec"><strong>display-md</strong><br>44 / 600</div><div class="sample" style="font-size:32px;font-weight:600">OFICINA ABERTA</div></div>
</body></html>
