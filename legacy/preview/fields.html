<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Form Fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--papel); }
  .wrap { width: 660px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label {
    font-family: var(--font-display); font-weight: 600; font-size: 12px;
    text-transform: uppercase; letter-spacing: .06em; color: var(--fg1);
    display: block; margin-bottom: 6px;
  }
  .field {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--preto-diesel);
    border-radius: 2px;
    background: white;
    font-family: var(--font-body);
    font-size: 16px;
    box-shadow: inset 0 1px 0 rgba(0,0,0,0.06);
    box-sizing: border-box;
  }
  .field:focus { outline: 3px solid var(--laranja-oficina); outline-offset: 1px; }
  .field.mono { font-family: var(--font-mono); letter-spacing: 2px; text-transform: uppercase; }
  .hint { font-family: var(--font-mono); font-size: 11px; color: var(--graxa); margin-top: 4px; }
  .focused { outline: 3px solid var(--laranja-oficina); outline-offset: 1px; }
</style></head>
<body>
<div class="wrap">
  <div><label>Nome</label><input class="field" value="João Ribeiro"></div>
  <div><label>Placa</label><input class="field mono" value="ABC-1D23"></div>
  <div><label>Telefone</label><input class="field focused" value="(11) 98765-4321"><div class="hint">focus — 3px orange</div></div>
  <div><label>Serviço</label>
    <select class="field">
      <option>Manutenção preventiva</option>
    </select>
  </div>
</div>
</body></html>
