<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Radii &amp; Shadows</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px; }
  .wrap { width: 660px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .tile {
    height: 110px;
    background: white;
    border: 2px solid var(--preto-diesel);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 600; font-size: 13px;
    text-transform: uppercase; letter-spacing: .04em;
    position: relative;
  }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--graxa); text-align: center; margin-top: 8px; }
</style></head>
<body>
<div class="wrap">
  <div>
    <div class="tile" style="border-radius:0">r-0</div>
    <div class="meta">0px · default</div>
  </div>
  <div>
    <div class="tile" style="border-radius:2px">r-sm</div>
    <div class="meta">2px · inputs</div>
  </div>
  <div>
    <div class="tile" style="border-radius:4px">r-md</div>
    <div class="meta">4px · cards</div>
  </div>
  <div>
    <div class="tile" style="border-radius:999px;padding:0 24px;height:44px;margin-top:33px">r-pill</div>
    <div class="meta">pill · status only</div>
  </div>
  <div>
    <div class="tile" style="border-radius:4px;box-shadow:2px 2px 0 0 #0E0E10">shadow-sm</div>
    <div class="meta">2px hard offset</div>
  </div>
  <div>
    <div class="tile" style="border-radius:4px;box-shadow:4px 4px 0 0 #0E0E10">shadow-md</div>
    <div class="meta">4px hard offset</div>
  </div>
  <div>
    <div class="tile" style="border-radius:4px;box-shadow:6px 6px 0 0 #0E0E10">shadow-lg</div>
    <div class="meta">6px · hero</div>
  </div>
  <div>
    <div class="tile" style="border-radius:4px;box-shadow:4px 4px 0 0 #FF6A1A">accent</div>
    <div class="meta">4px orange offset</div>
  </div>
</div>
</body></html>
