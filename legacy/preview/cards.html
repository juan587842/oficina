<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--papel); }
  .wrap { width: 660px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { padding: 18px; }
  .card h3 { font-size: 18px; letter-spacing: .04em; margin-bottom: 6px; }
  .card p { font-size: 14px; margin: 0; color: var(--fg2); }
  .icon { width: 28px; height: 28px; color: var(--laranja-oficina); margin-bottom: 10px; }
</style></head>
<body>
<div class="wrap">
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="14" height="11"/><rect x="15" y="9" width="7" height="8"/><circle cx="6" cy="19" r="2"/><circle cx="18" cy="19" r="2"/></svg>
    <h3>Manutenção pesada</h3>
    <p>Motor, câmbio, diferencial. Diagnóstico em até 2 horas.</p>
  </div>
  <div class="card feature">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    <h3>Preventiva</h3>
    <p>Contratos de frota — checklist a cada 20 mil km.</p>
  </div>
</div>
</body></html>
